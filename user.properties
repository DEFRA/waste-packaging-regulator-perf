# Hosts (no protocol, no trailing slash)
# Override per environment via -JCOMPLIANCE_HOST=... or COMPLIANCE_HOST env var
DASHBOARD_HOST=waste-regulator-dashboard-fe.dev.cdp-int.defra.cloud
COMPLIANCE_HOST=waste-packaging-regulators-fe.dev.cdp-int.defra.cloud

# Load profile
THREADS=10
RAMP_UP=30
DURATION=120

# Response time threshold in milliseconds
RESPONSE_TIME_THRESHOLD_MS=3000

# Session cookies are short-lived — injected at runtime by entrypoint.sh/run-tests.sh.
DASHBOARD_SESSION_COOKIE=
COMPLIANCE_SESSION_COOKIE=
